<!DOCTYPE html>
<html lang="et">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flexbox - Live Editor</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
  <link rel="stylesheet" href="../editor/editor.css">
</head>

<body>
  <h1>Flexbox - Live Editor</h1>
  <div class="layout">
    <div class="editor-panel" id="editor-panel">
      <div class="tabs" role="tablist">
        <button type="button" class="tab active" data-tab="html" role="tab" aria-selected="true">HTML</button>
        <button type="button" class="tab" data-tab="css" role="tab" aria-selected="false">CSS</button>
      </div>
      <div class="tab-panel active" id="html-panel">
        <div class="editor-wrap">
          <textarea id="html-editor"></textarea>
        </div>
      </div>
      <div class="tab-panel" id="css-panel">
        <div class="editor-wrap">
          <textarea id="css-editor"></textarea>
        </div>
      </div>
    </div>
    <div class="resizer" id="resizer" role="separator" title="Resize" aria-orientation="vertical"></div>
    <div class="preview-panel">
      <div class="panel-header">Preview</div>
      <div class="preview-wrap">
        <iframe id="preview" sandbox="allow-scripts allow-same-origin"></iframe>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
  <script type="module" src="../editor/editor.js"></script>
</body>

</html>
